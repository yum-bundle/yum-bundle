<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — yum-bundle{% else %}yum-bundle{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  {% if page.url %}<link rel="canonical" href="{{ site.url }}{{ page.url }}">{% endif %}
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      var prefer = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      if ((saved || prefer) === 'light') document.documentElement.setAttribute('data-theme', 'light');
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080b10;
      --surface:   #0e1219;
      --border:    #1a2030;
      --text:      #d8dde8;
      --heading:   #ffffff;
      --muted:     #5a6480;
      --accent:    #e879f9;
      --accent-dim:#2d0a35;
      --green:     #4ade80;
      --yellow:    #fbbf24;
      --red:       #f87171;
      --code-bg:   #0a0f18;
      --radius:    6px;
      --mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    [data-theme="light"] {
      --bg:        #f8fafc;
      --surface:   #f1f5f9;
      --border:    #e2e8f0;
      --text:      #1e293b;
      --heading:   #0f172a;
      --muted:     #64748b;
      --accent:    #a21caf;
      --accent-dim:#fae8ff;
      --green:     #16a34a;
      --yellow:    #d97706;
      --red:       #dc2626;
      --code-bg:   #0a0f18;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      transition: background 0.2s, color 0.2s;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Layout ── */
    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 0;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
    header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: var(--mono);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
      text-decoration: none;
    }
    .logo:hover { text-decoration: none; }
    .logo span { color: var(--accent); }
    header nav { display: flex; align-items: center; }
    header nav a {
      font-size: 0.875rem;
      color: var(--muted);
      margin-left: 24px;
    }
    header nav a:hover { color: var(--text); text-decoration: none; }
    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--muted);
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-left: 20px;
      flex-shrink: 0;
      transition: color 0.15s, border-color 0.15s;
    }
    .theme-toggle:hover { color: var(--text); border-color: var(--muted); }
    .theme-toggle svg { width: 15px; height: 15px; fill: currentColor; }

    /* ── Page layout ── */
    .page-layout {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 0;
      min-height: calc(100vh - 62px);
    }

    /* ── Sidebar ── */
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 32px 0;
      position: sticky;
      top: 62px;
      height: calc(100vh - 62px);
      overflow-y: auto;
    }
    .sidebar-section {
      padding: 0 20px;
      margin-bottom: 24px;
    }
    .sidebar-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 8px;
      font-family: var(--mono);
    }
    .sidebar-nav a {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      padding: 5px 8px;
      border-radius: 4px;
      margin-bottom: 2px;
      transition: background 0.1s, color 0.1s;
    }
    .sidebar-nav a:hover {
      background: var(--surface);
      color: var(--text);
      text-decoration: none;
    }
    .sidebar-nav a.active {
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      color: var(--accent);
    }

    /* ── Main content ── */
    main {
      padding: 40px 40px 80px;
      min-width: 0;
    }

    /* ── Breadcrumb ── */
    .breadcrumb {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 28px;
      font-family: var(--mono);
    }
    .breadcrumb a { color: var(--muted); }
    .breadcrumb a:hover { color: var(--accent); }
    .breadcrumb span { margin: 0 6px; }

    /* ── Prose styles ── */
    .prose h1 {
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
      color: var(--heading);
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .prose h2 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--heading);
      margin-top: 40px;
      margin-bottom: 12px;
    }
    .prose h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--heading);
      margin-top: 28px;
      margin-bottom: 8px;
    }
    .prose h4 {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--heading);
      margin-top: 20px;
      margin-bottom: 6px;
    }
    .prose p {
      margin-bottom: 16px;
      color: var(--text);
    }
    .prose ul, .prose ol {
      margin-bottom: 16px;
      padding-left: 24px;
    }
    .prose li {
      margin-bottom: 4px;
      color: var(--text);
    }
    .prose li + li { margin-top: 4px; }
    .prose strong { color: var(--heading); }
    .prose em { color: var(--text); font-style: italic; }
    .prose a { color: var(--accent); }
    .prose hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }

    /* ── Inline code ── */
    .prose code {
      font-family: var(--mono);
      font-size: 0.85em;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 8%, transparent);
      padding: 2px 6px;
      border-radius: 3px;
    }

    /* ── Code blocks ── */
    .prose pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      overflow-x: auto;
      margin-bottom: 20px;
    }
    .prose pre code {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--text);
      background: none;
      padding: 0;
      border-radius: 0;
      line-height: 1.7;
    }

    /* ── Tables ── */
    .prose table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      margin-bottom: 20px;
    }
    .prose th {
      text-align: left;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 0 12px 12px;
      border-bottom: 1px solid var(--border);
    }
    .prose th:first-child { padding-left: 0; }
    .prose td {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      vertical-align: top;
      color: var(--text);
    }
    .prose td:first-child { padding-left: 0; }

    /* ── Blockquote ── */
    .prose blockquote {
      border-left: 3px solid var(--accent);
      padding: 12px 20px;
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 0.95rem;
      font-style: italic;
      line-height: 1.7;
    }
    .prose blockquote strong { color: var(--text); font-style: normal; }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 0;
    }
    footer .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    footer .logo { font-size: 0.95rem; }
    footer p {
      font-size: 0.8rem;
      color: var(--muted);
    }
    footer nav a {
      font-size: 0.8rem;
      margin-left: 20px;
    }

    /* ── Mobile ── */
    @media (max-width: 720px) {
      .page-layout { grid-template-columns: 1fr; }
      .sidebar {
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 16px 0;
      }
      .sidebar-section { padding: 0 24px; }
      .sidebar-nav { display: flex; flex-wrap: wrap; gap: 4px; }
      .sidebar-nav a { padding: 4px 10px; }
      main { padding: 24px 24px 60px; }
      header nav a { margin-left: 16px; }
      footer .container { flex-direction: column; align-items: flex-start; }
      footer nav a:first-child { margin-left: 0; }
    }
    @media (max-width: 480px) {
      nav a.hide-mobile { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="container">
    <a class="logo" href="/"><span>yum</span>-bundle</a>
    <nav>
      <a href="/yumfile-format.html" class="hide-mobile">Yumfile</a>
      <a href="/usage.html">Docs</a>
      <a href="https://github.com/yum-bundle/yum-bundle">GitHub</a>
      <button class="theme-toggle" aria-label="Toggle theme" onclick="toggleTheme()">
        <svg id="icon-sun" viewBox="0 0 24 24" style="display:none"><path d="M12 17a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2a1 1 0 0 1 1 1v1a1 1 0 0 1-2 0v-1a1 1 0 0 1 1-1zm0-16a1 1 0 0 1 1 1v1a1 1 0 0 1-2 0V4a1 1 0 0 1 1-1zm9 9a1 1 0 0 1 0 2h-1a1 1 0 0 1 0-2h1zM4 12a1 1 0 0 1 0 2H3a1 1 0 0 1 0-2h1zm14.95 5.536a1 1 0 0 1-1.414 1.414l-.707-.707a1 1 0 1 1 1.414-1.414l.707.707zm-12.728 0 .707.707a1 1 0 1 1-1.414 1.414l-.707-.707a1 1 0 0 1 1.414-1.414zm12.728-13.072-.707.707a1 1 0 1 1-1.414-1.414l.707-.707a1 1 0 0 1 1.414 1.414zm-12.728 0a1 1 0 0 1 1.414 1.414l-.707.707A1 1 0 1 1 4.808 4.95l.707-.707z"/></svg>
        <svg id="icon-moon" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
      </button>
    </nav>
  </div>
</header>

<div class="page-layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Docs</div>
      <nav class="sidebar-nav">
        <a href="/installation.html" {% if page.url == '/installation.html' %}class="active"{% endif %}>Installation</a>
        <a href="/usage.html" {% if page.url == '/usage.html' %}class="active"{% endif %}>Usage</a>
        <a href="/yumfile-format.html" {% if page.url == '/yumfile-format.html' %}class="active"{% endif %}>Yumfile Format</a>
        <a href="/github-actions.html" {% if page.url == '/github-actions.html' %}class="active"{% endif %}>GitHub Actions</a>
        <a href="/contributing.html" {% if page.url == '/contributing.html' %}class="active"{% endif %}>Contributing</a>
      </nav>
    </div>
  </aside>

  <main>
    <div class="breadcrumb">
      <a href="/">yum-bundle</a><span>/</span>{{ page.title }}
    </div>
    <article class="prose">
      {{ content }}
    </article>
  </main>
</div>

<footer>
  <div class="container">
    <div class="logo"><span>yum</span>-bundle</div>
    <p>Released under the <a href="https://github.com/yum-bundle/yum-bundle/blob/main/LICENSE">Apache 2.0 License</a></p>
    <nav>
      <a href="/installation.html">Install</a>
      <a href="/usage.html">Docs</a>
      <a href="/yumfile-format.html">Yumfile</a>
      <a href="/github-actions.html">GitHub Actions</a>
      <a href="https://github.com/yum-bundle/yum-bundle">GitHub</a>
    </nav>
  </div>
</footer>

<script>
  function toggleTheme() {
    var html = document.documentElement;
    var isLight = html.getAttribute('data-theme') === 'light';
    if (isLight) {
      html.removeAttribute('data-theme');
      localStorage.setItem('theme', 'dark');
    } else {
      html.setAttribute('data-theme', 'light');
      localStorage.setItem('theme', 'light');
    }
    updateIcon();
  }

  function updateIcon() {
    var isLight = document.documentElement.getAttribute('data-theme') === 'light';
    document.getElementById('icon-sun').style.display = isLight ? 'block' : 'none';
    document.getElementById('icon-moon').style.display = isLight ? 'none' : 'block';
  }

  updateIcon();
</script>
</body>
</html>
