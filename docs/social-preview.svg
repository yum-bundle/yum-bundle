<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Cube face gradients (scaled to 200x200 icon at offset 220,220) -->
    <linearGradient id="g-top" x1="264" y1="236" x2="348" y2="292" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#e8a85a"/>
      <stop offset="100%" stop-color="#8c4a18"/>
    </linearGradient>
    <linearGradient id="g-left" x1="250" y1="260" x2="296" y2="388" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7c4222"/>
      <stop offset="100%" stop-color="#2e1006"/>
    </linearGradient>
    <linearGradient id="g-right" x1="390" y1="260" x2="344" y2="388" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#c47c3a"/>
      <stop offset="100%" stop-color="#4e220a"/>
    </linearGradient>
    <linearGradient id="g-tape-ul" x1="320" y1="320" x2="250" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#c050d8"/>
    </linearGradient>
    <linearGradient id="g-tape-ur" x1="320" y1="320" x2="390" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#c050d8"/>
    </linearGradient>
    <linearGradient id="g-tape-b" x1="320" y1="320" x2="320" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#c050d8"/>
    </linearGradient>
    <!-- Clip paths for cube faces (200x200 at offset 220,220, viewBox 100→200 scale=2) -->
    <clipPath id="sct"><polygon points="320,220 250,260 320,320 390,260"/></clipPath>
    <clipPath id="scl"><polygon points="250,260 250,340 320,420 320,320"/></clipPath>
    <clipPath id="scr"><polygon points="390,260 320,320 320,420 390,340"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#080b10"/>
  <!-- Subtle top accent line -->
  <rect width="1280" height="2" fill="#e879f9" opacity="0.35"/>

  <!-- Cube icon (centered vertically at x~220-420, y~220-420) -->
  <polygon points="320,220 250,260 320,320 390,260" fill="url(#g-top)"/>
  <polygon points="250,260 250,340 320,420 320,320" fill="url(#g-left)"/>
  <polygon points="390,260 320,320 320,420 390,340" fill="url(#g-right)"/>

  <g fill="none" stroke-width="12" opacity="0.88" stroke-linecap="butt">
    <line x1="320" y1="320" x2="250" y2="260" stroke="url(#g-tape-ul)" clip-path="url(#sct)"/>
    <line x1="320" y1="320" x2="250" y2="260" stroke="url(#g-tape-ul)" clip-path="url(#scl)"/>
    <line x1="320" y1="320" x2="390" y2="260" stroke="url(#g-tape-ur)" clip-path="url(#sct)"/>
    <line x1="320" y1="320" x2="390" y2="260" stroke="url(#g-tape-ur)" clip-path="url(#scr)"/>
    <line x1="320" y1="320" x2="320" y2="420" stroke="url(#g-tape-b)"  clip-path="url(#scl)"/>
    <line x1="320" y1="320" x2="320" y2="420" stroke="url(#g-tape-b)"  clip-path="url(#scr)"/>
  </g>
  <g fill="none" stroke="#f8c8ff" stroke-width="2" opacity="0.45" stroke-linecap="butt">
    <line x1="320" y1="320" x2="250" y2="260" clip-path="url(#sct)"/>
    <line x1="320" y1="320" x2="250" y2="260" clip-path="url(#scl)"/>
    <line x1="320" y1="320" x2="390" y2="260" clip-path="url(#sct)"/>
    <line x1="320" y1="320" x2="390" y2="260" clip-path="url(#scr)"/>
    <line x1="320" y1="320" x2="320" y2="420" clip-path="url(#scl)"/>
    <line x1="320" y1="320" x2="320" y2="420" clip-path="url(#scr)"/>
  </g>
  <circle cx="320" cy="320" r="6" fill="#e879f9" opacity="0.88"/>
  <polygon points="320,220 250,260 250,340 320,420 390,340 390,260"
           fill="none" stroke="#180a02" stroke-width="2.4"/>
  <g stroke="#180a02" stroke-width="1.8" opacity="0.55" fill="none">
    <line x1="320" y1="220" x2="320" y2="320"/>
    <line x1="250" y1="340" x2="320" y2="320"/>
    <line x1="390" y1="340" x2="320" y2="320"/>
  </g>

  <!-- Brand name -->
  <text x="490" y="318"
        font-family="Ubuntu Mono, DejaVu Sans Mono, Liberation Mono, monospace"
        font-size="90" font-weight="700" letter-spacing="-2" fill="#ffffff">
    <tspan fill="#e879f9">yum</tspan>-bundle
  </text>

  <!-- Tagline -->
  <text x="494" y="374"
        font-family="DejaVu Sans, Liberation Sans, sans-serif"
        font-size="30" fill="#5a6480">
    brew bundle — but for dnf/yum
  </text>

  <!-- Divider -->
  <line x1="490" y1="406" x2="1140" y2="406" stroke="#1a2030" stroke-width="1"/>

  <!-- Platform tags -->
  <text x="494" y="442"
        font-family="Ubuntu Mono, DejaVu Sans Mono, monospace"
        font-size="22" fill="#3d405a" letter-spacing="1">
    RHEL · CentOS · Fedora · Rocky · AlmaLinux
  </text>

  <!-- URL -->
  <text x="494" y="490"
        font-family="Ubuntu Mono, DejaVu Sans Mono, monospace"
        font-size="22" fill="#e879f9" opacity="0.5">
    yum-bundle.org
  </text>
</svg>