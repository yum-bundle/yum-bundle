<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="640" fill="#080b10"/>

  <!-- Subtle border glow at top -->
  <rect width="1280" height="2" fill="#e879f9" opacity="0.4"/>

  <!-- Icon: centered left at x=240, y=220, 200x200 -->
  <g transform="translate(220, 220)">
    <rect width="200" height="200" rx="44" fill="#0e1219"/>
    <!-- Y arms (scaled 2x from 100-unit viewBox) -->
    <line x1="42"  y1="40"  x2="100" y2="104" stroke="#e879f9" stroke-width="18" stroke-linecap="round"/>
    <line x1="158" y1="40"  x2="100" y2="104" stroke="#e879f9" stroke-width="18" stroke-linecap="round"/>
    <!-- Y stem -->
    <line x1="100" y1="104" x2="100" y2="160" stroke="#e879f9" stroke-width="18" stroke-linecap="round"/>
    <!-- Package nodes -->
    <circle cx="42"  cy="40"  r="15" fill="#e879f9"/>
    <circle cx="158" cy="40"  r="15" fill="#e879f9"/>
    <circle cx="100" cy="160" r="15" fill="#e879f9"/>
  </g>

  <!-- Brand name: "yum" in magenta, "-bundle" in white -->
  <text x="510" y="310"
        font-family="Ubuntu Mono, DejaVu Sans Mono, Liberation Mono, monospace"
        font-size="90" font-weight="700"
        letter-spacing="-2" fill="#ffffff">
    <tspan fill="#e879f9">yum</tspan>-bundle
  </text>

  <!-- Tagline -->
  <text x="514" y="370"
        font-family="DejaVu Sans, Liberation Sans, sans-serif"
        font-size="30" fill="#5a6480">
    brew bundle — but for dnf/yum
  </text>

  <!-- Divider -->
  <line x1="510" y1="402" x2="1140" y2="402" stroke="#1a2030" stroke-width="1"/>

  <!-- Platform tags -->
  <text x="514" y="438"
        font-family="Ubuntu Mono, DejaVu Sans Mono, monospace"
        font-size="22" fill="#3d405a" letter-spacing="1">
    RHEL · CentOS · Fedora · Rocky · AlmaLinux
  </text>

  <!-- URL -->
  <text x="514" y="490"
        font-family="Ubuntu Mono, DejaVu Sans Mono, monospace"
        font-size="22" fill="#e879f9" opacity="0.5">
    yum-bundle.org
  </text>
</svg>
