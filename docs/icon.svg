<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g-top" x1="22" y1="16" x2="64" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#e8a85a"/>
      <stop offset="100%" stop-color="#8c4a18"/>
    </linearGradient>
    <linearGradient id="g-left" x1="15" y1="30" x2="38" y2="84" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7c4222"/>
      <stop offset="100%" stop-color="#2e1006"/>
    </linearGradient>
    <linearGradient id="g-right" x1="85" y1="30" x2="62" y2="84" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#c47c3a"/>
      <stop offset="100%" stop-color="#4e220a"/>
    </linearGradient>
    <linearGradient id="g-tape-ul" x1="50" y1="50" x2="15" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#c050d8"/>
    </linearGradient>
    <linearGradient id="g-tape-ur" x1="50" y1="50" x2="85" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#c050d8"/>
    </linearGradient>
    <linearGradient id="g-tape-b" x1="50" y1="50" x2="50" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#c050d8"/>
    </linearGradient>
    <clipPath id="ct"><polygon points="50,10 15,30 50,50 85,30"/></clipPath>
    <clipPath id="cl"><polygon points="15,30 15,70 50,90 50,50"/></clipPath>
    <clipPath id="cr"><polygon points="85,30 50,50 50,90 85,70"/></clipPath>
  </defs>

  <!-- Box faces — no background rect, transparent outside -->
  <polygon points="50,10 15,30 50,50 85,30" fill="url(#g-top)"/>
  <polygon points="15,30 15,70 50,90 50,50" fill="url(#g-left)"/>
  <polygon points="85,30 50,50 50,90 85,70" fill="url(#g-right)"/>

  <!-- Tape strips clipped to each face (stroke-width=6) -->
  <g fill="none" stroke-width="6" opacity="0.88" stroke-linecap="butt">
    <line x1="50" y1="50" x2="15" y2="30" stroke="url(#g-tape-ul)" clip-path="url(#ct)"/>
    <line x1="50" y1="50" x2="15" y2="30" stroke="url(#g-tape-ul)" clip-path="url(#cl)"/>
    <line x1="50" y1="50" x2="85" y2="30" stroke="url(#g-tape-ur)" clip-path="url(#ct)"/>
    <line x1="50" y1="50" x2="85" y2="30" stroke="url(#g-tape-ur)" clip-path="url(#cr)"/>
    <line x1="50" y1="50" x2="50" y2="90" stroke="url(#g-tape-b)"  clip-path="url(#cl)"/>
    <line x1="50" y1="50" x2="50" y2="90" stroke="url(#g-tape-b)"  clip-path="url(#cr)"/>
  </g>

  <!-- Tape gloss highlight -->
  <g fill="none" stroke="#f8c8ff" stroke-width="1" opacity="0.45" stroke-linecap="butt">
    <line x1="50" y1="50" x2="15" y2="30" clip-path="url(#ct)"/>
    <line x1="50" y1="50" x2="15" y2="30" clip-path="url(#cl)"/>
    <line x1="50" y1="50" x2="85" y2="30" clip-path="url(#ct)"/>
    <line x1="50" y1="50" x2="85" y2="30" clip-path="url(#cr)"/>
    <line x1="50" y1="50" x2="50" y2="90" clip-path="url(#cl)"/>
    <line x1="50" y1="50" x2="50" y2="90" clip-path="url(#cr)"/>
  </g>

  <!-- Center junction -->
  <circle cx="50" cy="50" r="3" fill="#e879f9" opacity="0.88"/>

  <!-- Outer silhouette -->
  <polygon points="50,10 15,30 15,70 50,90 85,70 85,30"
           fill="none" stroke="#180a02" stroke-width="1.2"/>

  <!-- Inner receding edges -->
  <g stroke="#180a02" stroke-width="0.9" opacity="0.55" fill="none">
    <line x1="50" y1="10" x2="50" y2="50"/>
    <line x1="15" y1="70" x2="50" y2="50"/>
    <line x1="85" y1="70" x2="50" y2="50"/>
  </g>
</svg>
