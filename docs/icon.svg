<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: dark rounded square -->
  <rect width="100" height="100" rx="22" fill="#0e1219"/>
  <!-- Y arms -->
  <line x1="21" y1="20" x2="50" y2="52" stroke="#e879f9" stroke-width="9" stroke-linecap="round"/>
  <line x1="79" y1="20" x2="50" y2="52" stroke="#e879f9" stroke-width="9" stroke-linecap="round"/>
  <!-- Y stem -->
  <line x1="50" y1="52" x2="50" y2="80" stroke="#e879f9" stroke-width="9" stroke-linecap="round"/>
  <!-- Package nodes at each tip -->
  <circle cx="21" cy="20" r="7.5" fill="#e879f9"/>
  <circle cx="79" cy="20" r="7.5" fill="#e879f9"/>
  <circle cx="50" cy="80" r="7.5" fill="#e879f9"/>
</svg>
